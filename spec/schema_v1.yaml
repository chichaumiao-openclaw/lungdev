version: 1.0.0
name: respiratory_atlas_core_schema
updated_at: '2026-03-09'

entities:
  record:
    required:
      - dataset_id
      - record_id
      - species
      - tissue
      - cell_type
      - stage_or_disease
      - platform
      - evidence_level
      - source_ref
      - version
      - updated_at
    optional:
      - gene_symbol
      - trajectory_state
      - disease_subtype
      - homolog_group
      - target_score

fields:
  dataset_id:
    type: string
    example: DEV_HUMAN_LUNG_001
  record_id:
    type: string
    example: rec_000001
  species:
    type: string
    enum: [human, mouse, macaque, rat, other]
  tissue:
    type: string
    example: lung
  cell_type:
    type: string
    example: AT2
  gene_symbol:
    type: [string, 'null']
    example: SFTPC
  stage_or_disease:
    type: string
    description: Development stage for DB1, disease label for DB2
    example: fetal_week_20
  platform:
    type: string
    example: 10x_v3
  evidence_level:
    type: string
    enum: [A, B, C]
    description: A=validated, B=strong computational, C=exploratory
  source_ref:
    type: string
    description: DOI/PMID/URL
    example: PMID:12345678
  version:
    type: string
    example: 1.0.0+2026-03-09
  updated_at:
    type: string
    format: date-time

validation_rules:
  - name: required_fields_present
    rule: "All required fields must exist; missing values use explicit null only for optional fields"
  - name: provenance_mandatory
    rule: "source_ref must be non-empty for any record shown in detail page"
  - name: evidence_visible
    rule: "evidence_level and version must be returned by /detail"
  - name: id_uniqueness
    rule: "record_id unique within dataset_id"
