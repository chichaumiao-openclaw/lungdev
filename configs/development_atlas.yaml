db_key: development_atlas
display_name: 呼吸发育单细胞图谱库
scientific_question: 发育阶段中关键细胞谱系如何转变？

theme:
  primary: '#2E9F64'
  accent: '#7BCF9A'
  warning: '#F4B400'

routes:
  home: true
  browse: true
  celltype_detail: true
  gene_detail: true
  visualization: true
  download_api: true

search:
  enabled_keys: [gene_symbol, cell_type, tissue]

filters:
  enabled_keys: [species, stage_or_disease, platform]
  defaults:
    species: human

mapping:
  stage_or_disease: stage
  gene_symbol: gene

feature_flags:
  trajectory: true
  disease_compare: false
  cross_species_map: false
  target_evidence_card: false
  api_public_preview: true

provenance:
  show_source_ref_by_default: true
  show_evidence_level_by_default: true
  show_version_by_default: true
